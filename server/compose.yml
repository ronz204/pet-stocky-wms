name: stocky-api

services:
  postgres:
    env_file: .env.local
    image: postgres:16-alpine
    restart: unless-stopped
    container_name: postgres
    networks:
      - stocky-net
    ports:
      - "5432:5432"
    volumes:
      - stocky-data:/var/lib/postgresql/data
    healthcheck: # Use pg_isready to check if the database is ready
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  stocky-data:
    driver: local
    name: stocky-data

networks:
  stocky-net:
    driver: bridge
    name: stocky-net
