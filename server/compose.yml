services:
  stocky:
    env_file: ".env"
    build:
      context: .
      target: development
      dockerfile: dockerfile
    container_name: stocky
    restart: unless-stopped
    depends_on:
      # Wait for the database to be healthy
      postgres:
        condition: service_healthy
      # Wait for migrations to complete
      migrations:
        condition: service_completed_successfully
    networks:
      - stocky-network

  postgres:
    image: postgres:16-alpine
    env_file: ".env"
    restart: unless-stopped
    networks:
      - stocky-network
    volumes:
      - stocky-data:/var/lib/postgresql/data
    healthcheck:
      # Use pg_isready to check if the database is ready
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  migrations:
    env_file: ".env"
    build:
      context: .
      target: development
      dockerfile: dockerfile
    container_name: migrations
    restart: "no"
    networks:
      - stocky-network
