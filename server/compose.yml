services:
  postgres:
    env_file: ".env"
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    networks:
      - stocky-net
    ports:
      - "5432:5432"
    volumes:
      - stocky-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
