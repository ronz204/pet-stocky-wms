services:
  graphql:
    env_file: ".env"
    build:
      context: .
      target: development
      dockerfile: dockerfile
    container_name: stocky
    restart: unless-stopped
    networks:
      - stocky-net
    ports:
      - "3000:3000"
    depends_on:
      postgres: # Wait for the database to be healthy
        condition: service_healthy
    develop:
      watch:
        # Sync source code changes
        - action: sync
          path: ./source
          target: /usr/src/app/source
        # Rebuild when Prisma models change
        - action: rebuild
          path: ./prisma
        # Sync package.json for dependency tracking
        - action: sync
          path: ./package.json
          target: /usr/src/app/package.json
        # Rebuild when dependencies change
        - action: rebuild
          path: ./bun.lock
    healthcheck: # Use curl to check if the application is healthy
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
  
  postgres:
    env_file: ".env"
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    networks:
      - stocky-net
    ports:
      - "5432:5432"
    volumes:
      - stocky-data:/var/lib/postgresql/data
    healthcheck:
      # Use pg_isready to check if the database is ready
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
