services:
  stocky:
    build:
      context: .
      target: development
      dockerfile: dockerfile
    extends:
      service: stocky
      file: ./compose.base.yml
    container_name: stocky
    restart: unless-stopped
    ports:
      - "3000:3000"
    develop:
      watch:
        # Sync source code changes
        - action: sync
          path: ./source
          target: /usr/src/app/source
        # Rebuild when Prisma models change
        - action: rebuild
          path: ./prisma/
        # Sync package.json for dependency tracking
        - action: sync
          path: ./package.json
          target: /usr/src/app/package.json
        # Rebuild when dependencies change
        - action: rebuild
          path: ./bun.lock

  postgres:
    env_file: ".env"
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    networks:
      - stocky-net
    volumes:
      - stocky-data:/var/lib/postgresql/data
    healthcheck:
      # Use pg_isready to check if the database is ready
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  migrations:
    build:
      context: .
      target: development
      dockerfile: dockerfile
    extends:
      service: migrations
      file: ./compose.base.yml
    container_name: migrations
    restart: "no"
