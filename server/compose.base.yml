services:
  graphql:
    env_file: ".env"
    depends_on:
      # Wait for the database to be healthy
      postgres:
        condition: service_healthy
    networks:
      - stocky-net

  postgres:
    env_file: ".env"
    image: postgres:16-alpine
    networks:
      - stocky-net
    volumes:
      - stocky-data:/var/lib/postgresql/data
    healthcheck:
      # Use pg_isready to check if the database is ready
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
