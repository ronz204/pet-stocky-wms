services:
  graphql:
    networks:
      - stocky-net
    depends_on:
      # Wait for the database to be healthy
      postgres:
        condition: service_healthy
    develop:
      watch:
        # Sync source code changes
        - action: sync
          path: ./source
          target: /usr/src/app/source
        # Rebuild when Prisma models change
        - action: rebuild
          path: ./prisma
        # Sync package.json for dependency tracking
        - action: sync
          path: ./package.json
          target: /usr/src/app/package.json
        # Rebuild when dependencies change
        - action: rebuild
          path: ./bun.lock
  
  postgres:
    image: postgres:16-alpine
    networks:
      - stocky-net
    volumes:
      - stocky-data:/var/lib/postgresql/data
    healthcheck:
      # Use pg_isready to check if the database is ready
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
